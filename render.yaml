services:
  - type: web
    name: meshex-api
    runtime: python
    plan: free  # <-- CRUCIAL FIX: Forces Render to use the $0 Free Tier!
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
